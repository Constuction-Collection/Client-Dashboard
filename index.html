<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Construction Collection - Client Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f8f7f5 0%, #f0ede9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      max-width: 500px;
      width: 100%;
      padding: 60px 40px;
      text-align: center;
    }

    .logo-box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 40px;
      display: inline-block;
    }

    .logo-box img {
      height: 60px;
      display: block;
    }

    h1 {
      color: #1a1a1a;
      font-size: 28px;
      font-weight: 300;
      margin-bottom: 15px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      color: #666;
      font-size: 16px;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      color: #333;
      font-weight: 500;
      margin-bottom: 10px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="email"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 16px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input[type="email"]:focus {
      outline: none;
      border-color: #2d7a7a;
      box-shadow: 0 0 0 3px rgba(45, 122, 122, 0.1);
    }

    button {
      width: 100%;
      padding: 14px 20px;
      background: #2d7a7a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button:hover {
      background: #245f5f;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(45, 122, 122, 0.2);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .error {
      color: #d9534f;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #2d7a7a;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .projects-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .projects-modal.show {
      display: flex;
    }

    .projects-content {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .projects-content h2 {
      color: #1a1a1a;
      margin-bottom: 25px;
      font-size: 24px;
      font-weight: 300;
    }

    .project-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-item {
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #fafafa;
    }

    .project-item:hover {
      border-color: #2d7a7a;
      background: #f0fafb;
      transform: translateX(4px);
    }

    .project-name {
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .project-type {
      font-size: 13px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .project-type-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-weight: 500;
      margin-left: 8px;
    }

    .project-type-badge.comparison {
      background: #e8f5f5;
      color: #2d7a7a;
    }

    .project-type-badge.sourcing {
      background: #f5f0e8;
      color: #8b6f47;
    }

    .project-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .dashboard-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #2d7a7a;
      background: white;
      color: #2d7a7a;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.3s ease;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .dashboard-btn:hover {
      background: #2d7a7a;
      color: white;
    }

    .admin-badge {
      display: inline-block;
      background: #2d7a7a;
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      margin-left: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .projects-section {
      display: none;
      margin-top: 60px;
    }

    .projects-section.show {
      display: block;
    }

    .projects-header {
      color: #1a1a1a;
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 30px;
      letter-spacing: 0.3px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 25px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .project-card:hover {
      border-color: #2d7a7a;
      box-shadow: 0 8px 24px rgba(45, 122, 122, 0.12);
      transform: translateY(-2px);
    }

    .project-card-name {
      font-size: 18px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .project-card-type {
      display: inline-block;
      background: #f5f0e8;
      color: #8b6f47;
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 18px;
    }

    .project-card-type.comparison {
      background: #e8f5f5;
      color: #2d7a7a;
    }

    .project-card-buttons {
      display: flex;
      gap: 10px;
      flex-direction: column;
    }

    .project-card-btn {
      padding: 12px 16px;
      border: none;
      background: #2d7a7a;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .project-card-btn:hover {
      background: #245f5f;
    }

    .project-card-btn.secondary {
      background: white;
      color: #2d7a7a;
      border: 2px solid #2d7a7a;
    }

    .project-card-btn.secondary:hover {
      background: #f0fafb;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-box">
      <img src="/cc-logo.png" alt="Construction Collection" style="max-width: 100%; height: auto;">
    </div>
    <h1>Construction Collection</h1>
    <p class="subtitle">Client Dashboard</p>

    <div id="loginForm">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Your Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
            autocomplete="email"
          >
        </div>
        <button type="submit">Access Dashboard</button>
        <div class="error" id="error"></div>
      </form>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #666;">Validating email...</p>
      </div>
    </div>

    <div class="projects-section" id="projectsSection">
      <div class="projects-header" id="projectsHeader">Your Projects</div>
      <div class="projects-grid" id="projectsGrid"></div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin === 'http://localhost:3000'
      ? 'http://localhost:3000/api'
      : 'https://client-dashboard-ugki.onrender.com/api';

    const ADMIN_EMAIL = 'sales@constructioncollection.com.au';

    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const errorDiv = document.getElementById('error');
      const loading = document.getElementById('loading');
      const form = event.target;

      errorDiv.style.display = 'none';
      errorDiv.textContent = '';
      form.style.display = 'none';
      loading.style.display = 'block';

      try {
        // Check if admin
        const isAdmin = email.toLowerCase() === ADMIN_EMAIL.toLowerCase();

        // Authenticate email
        const authResponse = await fetch(`${API_URL}/authenticate?email=${encodeURIComponent(email)}`);

        if (!authResponse.ok) {
          throw new Error('Email not found in our system');
        }

        const contactData = await authResponse.json();

        // Fetch projects
        let projects;
        if (isAdmin) {
          // Admin: fetch all projects
          const projectsResponse = await fetch(`${API_URL}/all-projects-with-types`);
          if (!projectsResponse.ok) {
            throw new Error('Failed to fetch projects');
          }
          projects = await projectsResponse.json();
        } else {
          // Client: fetch only their projects
          const projectsResponse = await fetch(`${API_URL}/client-projects-with-types?email=${encodeURIComponent(email)}`);
          if (!projectsResponse.ok) {
            throw new Error('Failed to fetch projects');
          }
          projects = await projectsResponse.json();
        }

        if (projects.length === 0) {
          throw new Error('No projects found');
        }

        // Show projects as tiles
        showProjectTiles(projects, email, isAdmin);

      } catch (error) {
        console.error('Error:', error);
        errorDiv.textContent = error.message || 'An error occurred. Please try again.';
        errorDiv.style.display = 'block';
        form.style.display = 'block';
        loading.style.display = 'none';
      }
    }

    function showProjectTiles(projects, email, isAdmin) {
      const projectsSection = document.getElementById('projectsSection');
      const projectsHeader = document.getElementById('projectsHeader');
      const projectsGrid = document.getElementById('projectsGrid');

      projectsGrid.innerHTML = '';

      if (isAdmin) {
        projectsHeader.innerHTML = 'All Projects <span class="admin-badge">Admin View</span>';
      }

      projects.forEach(project => {
        const card = document.createElement('div');
        card.className = 'project-card';

        const typeLabel = project.projectType === 'Comparison' ? 'Comparison' : 'Sourcing';
        const typeClass = project.projectType === 'Comparison' ? 'comparison' : 'sourcing';

        if (isAdmin) {
          // Admin: show both dashboard buttons
          card.innerHTML = `
            <div class="project-card-name">${project.name}</div>
            <div class="project-card-type ${typeClass}">${typeLabel}</div>
            <div class="project-card-buttons">
              <a class="project-card-btn" href="dashboard.html?email=${encodeURIComponent(email)}&project=${encodeURIComponent(project.name)}">
                Interior Designer
              </a>
              <a class="project-card-btn secondary" href="dashboard2.html?email=${encodeURIComponent(email)}&project=${encodeURIComponent(project.name)}">
                Landscape Designer
              </a>
            </div>
          `;
        } else {
          // Client: auto-route button
          const dashboard = project.projectType?.toLowerCase() === 'sourcing'
            ? 'dashboard2.html'
            : 'dashboard.html';
          const dashboardLabel = project.projectType?.toLowerCase() === 'sourcing'
            ? 'Landscape Designer'
            : 'Interior Designer';

          card.innerHTML = `
            <div class="project-card-name">${project.name}</div>
            <div class="project-card-type ${typeClass}">${typeLabel}</div>
            <div class="project-card-buttons">
              <a class="project-card-btn" href="${dashboard}?email=${encodeURIComponent(email)}&project=${encodeURIComponent(project.name)}">
                Open ${dashboardLabel}
              </a>
            </div>
          `;
        }

        projectsGrid.appendChild(card);
      });

      // Hide login form and show projects
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
      projectsSection.classList.add('show');
    }
  </script>
</body>
</html>
