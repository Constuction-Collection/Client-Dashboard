<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Comparison Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    h1 {
      color: #333;
      margin-bottom: 20px;
      font-size: 32px;
    }
    
    .project-selector {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    
    .project-selector label {
      font-weight: 600;
      color: #333;
    }
    
    .project-selector select {
      padding: 12px 16px;
      border: 2px solid #667eea;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      background: white;
      color: #333;
    }
    
    .project-selector select:focus {
      outline: none;
      border-color: #764ba2;
    }
    
    .dashboard {
      display: flex;
      flex-direction: column;
      gap: 40px;
      margin-bottom: 40px;
    }
    
    .product-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .card-header {
      font-size: 20px;
      font-weight: 700;
      color: #333;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 3px solid #667eea;
    }

    .option-item {
      border: 2px solid #f0f0f0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .option-item-content {
      flex: 1;
    }

    .option-item:last-child {
      margin-bottom: 0;
    }

    .option-item.selected {
      border-color: #28a745;
      background: #f0fdf4;
    }

    .option-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 15px;
    }

    .option-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      flex: 1;
    }

    .product-name {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      flex: 1;
    }
    
    .select-btn {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }
    
    .select-btn:hover {
      background: #764ba2;
    }
    
    .select-btn.selected {
      background: #28a745;
    }
    
    .images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 20px 15px;
    }

    .image-box {
      background: #f9f9f9;
      border-radius: 12px;
      overflow: hidden;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .image-label {
      font-size: 12px;
      color: #666;
      text-align: center;
      font-weight: 500;
      display: block !important;
    }

    .images > div > .image-label:first-child {
      margin-bottom: 5px;
      font-size: 18px;
      font-weight: 700;
      color: #333;
    }

    .images > div > .image-label:last-child {
      margin-top: 10px;
    }

    .supplier-label {
      font-size: 11px;
      color: #999;
      text-align: center;
      margin-top: 3px;
    }

    .room-spec {
      background: #f5f5f5;
      border-left: 4px solid #667eea;
      padding: 12px;
      margin: 12px 0;
      border-radius: 6px;
      font-size: 14px;
      color: #333;
    }

    .notes-section {
      background: #fffbf0;
      border-left: 4px solid #ffb74d;
      padding: 12px;
      margin: 12px 0;
      border-radius: 6px;
      font-size: 14px;
      color: #333;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    
    .pricing {
      background: #f8f9ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
    }
    
    .price-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 14px;
    }
    
    .savings {
      color: #28a745;
      font-weight: 600;
      font-size: 16px;
      margin-top: 10px;
    }

    .loss {
      color: #dc3545;
      font-weight: 600;
      font-size: 16px;
      margin-top: 10px;
    }
    
    .summary {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .summary h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
    }
    
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 16px;
    }
    
    .summary-row:last-child {
      border-bottom: none;
    }
    
    .summary-label {
      color: #666;
      font-weight: 500;
    }
    
    .summary-value {
      font-weight: 600;
      color: #333;
    }
    
    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 20px 0;
      margin-top: 20px;
      border-top: 2px solid #667eea;
      font-size: 20px;
      font-weight: 600;
    }
    
    .total-savings {
      color: #28a745;
    }
    
    .main-wrapper {
      display: flex;
      gap: 20px;
      margin-top: 30px;
    }

    .sidebar {
      position: sticky;
      top: 20px;
      width: 280px;
      height: fit-content;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      flex-shrink: 0;
    }

    .sidebar-search {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    .sidebar-search:focus {
      outline: none;
      border-color: #667eea;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .sidebar-list {
      list-style: none;
      max-height: calc(100vh - 250px);
      overflow-y: auto;
    }

    .sidebar-list li {
      margin-bottom: 8px;
    }

    .sidebar-list button {
      width: 100%;
      padding: 10px 12px;
      background: #f5f5f5;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
      color: #333;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .sidebar-list button:hover {
      background: #e8e8ff;
      border-left-color: #667eea;
    }

    .sidebar-list button.active {
      background: #e8e8ff;
      border-left-color: #667eea;
      font-weight: 600;
      color: #667eea;
    }

    .content-wrapper {
      flex: 1;
    }

    .loading {
      text-align: center;
      color: white;
      font-size: 18px;
    }
    
    .error {
      background: white;
      color: #d32f2f;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }
    
    @media (max-width: 768px) {
      .images {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .image-box {
        height: 250px;
      }

      h1 {
        font-size: 24px;
      }

      .project-selector {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header" id="header" style="display: none;">
      <h1>Product Comparison & Selection</h1>
      <div class="project-selector">
        <label for="projectSelect">Select Project:</label>
        <select id="projectSelect" onchange="changeProject()">
          <option value="">-- Choose a project --</option>
        </select>
      </div>
    </div>
    
    <div id="loading" class="loading">Loading projects...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div class="main-wrapper" id="mainWrapper" style="display: none;">
      <div class="sidebar">
        <div class="sidebar-title">Products</div>
        <ul class="sidebar-list" id="sidebarList"></ul>
      </div>
      <div class="content-wrapper">
        <div class="dashboard" id="dashboard"></div>
        <div class="summary" id="summary" style="display: none;">
          <h2>Project Summary</h2>
          <div id="summaryContent"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Dynamically construct API URL based on current domain
    const API_URL = window.location.origin === 'http://localhost:3000'
      ? 'http://localhost:3000/api'
      : 'https://client-dashboard-ugki.onrender.com/api';
    let allProducts = [];
    let selectedProducts = {}; // Track multiple selections by product index
    let currentProject = null;

    // Get project from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const urlProject = urlParams.get('project');

    async function fetchProjects() {
      try {
        // If a project is in the URL, skip the dropdown and load products directly
        if (urlProject) {
          fetchProductsForProject(urlProject);
          return;
        }

        // Otherwise, show the dropdown to select a project
        const response = await fetch(`${API_URL}/projects`);
        if (!response.ok) throw new Error('Failed to fetch projects');

        const projects = await response.json();
        populateProjectDropdown(projects);

        document.getElementById('header').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading projects: ' + error.message;
      }
    }

    function populateProjectDropdown(projects) {
      const select = document.getElementById('projectSelect');
      projects.forEach(project => {
        const option = document.createElement('option');
        option.value = project;
        option.textContent = project;
        select.appendChild(option);
      });
    }

    function changeProject() {
      const projectSelect = document.getElementById('projectSelect');
      const selectedProject = projectSelect.value;
      if (selectedProject) {
        fetchProductsForProject(selectedProject);
        window.history.pushState({}, '', `?project=${encodeURIComponent(selectedProject)}`);
      }
    }

    async function fetchProductsForProject(projectName) {
      try {
        currentProject = projectName;
        selectedProducts = {}; // Reset selections

        const response = await fetch(`${API_URL}/products?project=${encodeURIComponent(projectName)}`);
        if (!response.ok) throw new Error('Failed to fetch products');

        allProducts = await response.json();

        // If project was passed via URL, show a simple title instead of the dropdown
        if (urlProject) {
          const header = document.getElementById('header');
          header.innerHTML = `<h1>${projectName}</h1>`;
          header.style.display = 'block';
        }

        renderDashboard();
        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading products: ' + error.message;
      }
    }

    function getFieldValue(record, fieldName) {
      if (!record.fields) return null;
      return record.fields[fieldName];
    }

    function getImageUrl(imageArray) {
      if (Array.isArray(imageArray) && imageArray.length > 0) {
        return imageArray[0].url;
      }
      return null;
    }

    function renderDashboard() {
      const dashboard = document.getElementById('dashboard');
      dashboard.innerHTML = '';

      if (allProducts.length === 0) {
        dashboard.innerHTML = '<div style="color: white; text-align: center; padding: 40px;">No products found for this project.</div>';
        dashboard.style.display = 'flex';
        return;
      }

      // Group products by competitor product (enriched from backend)
      const groupedProducts = {};
      allProducts.forEach((product, index) => {
        const groupName = product.fields['Competitor_Product_Name_Text'] || 'Unknown Group';
        if (!groupedProducts[groupName]) {
          groupedProducts[groupName] = [];
        }
        groupedProducts[groupName].push({ product, index });
      });

      // Sort groups alphabetically
      const sortedGroupNames = Object.keys(groupedProducts).sort();

      // Create cards for each group
      sortedGroupNames.forEach(groupName => {
        const options = groupedProducts[groupName];
        const card = document.createElement('div');
        card.className = 'product-card';

        let optionsHtml = `<div class="card-header">${groupName}</div>`;

        options.forEach(({ product, index }) => {
          const fields = product.fields;
          const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown Product';
          const myPrice = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
          const competitorPrice = parseFloat(getFieldValue(product, 'Competitor Quoted Price + GST')) || 0;
          const costDiff = parseFloat(getFieldValue(product, 'Cost Difference')) || (myPrice - competitorPrice);
          const savingsPercentage = parseFloat(getFieldValue(product, 'Savings Percentage')) || 0;

          const myImages = getFieldValue(product, 'My Product Photos');
          const competitorImages = getFieldValue(product, 'Competitor Product Images');
          const mySupplier = getFieldValue(product, 'My Supplier') || 'N/A';
          const roomSpec = getFieldValue(product, 'Room (from Competitor\'s Products)') || '';
          const competitorNotes = getFieldValue(product, 'Competitor_Product_Notes') || '';
          const myNotes = getFieldValue(product, 'My Notes') || '';
          const competitorSupplier = getFieldValue(product, 'Competitor Supplier Name') || 'N/A';

          const isSelected = selectedProducts[groupName] === index;
          const optionClass = isSelected ? 'option-item selected' : 'option-item';

          optionsHtml += `
            <div class="${optionClass}" id="option-${index}">
              <div class="option-header">
                <button class="select-btn ${isSelected ? 'selected' : ''}" onclick="toggleProduct(${index}, '${groupName}')">
                  ${isSelected ? '✓ Selected' : 'Select'}
                </button>
              </div>

              <div class="option-item-content">
                <div class="images">
                <div>
                  <div class="image-label">${groupName}</div>
                  <div class="image-box">
                    ${competitorImages ? `<img src="${getImageUrl(competitorImages)}" alt="Competitor">` : '<div style="color: #ccc;">No Image</div>'}
                  </div>
                  <div class="image-label">Competitor Product</div>
                </div>
                <div>
                  <div class="image-label">${productName}</div>
                  <div class="image-box">
                    ${myImages ? `<img src="${getImageUrl(myImages)}" alt="My Product">` : '<div style="color: #ccc;">No Image</div>'}
                  </div>
                  <div class="image-label">Our Product</div>
                </div>
              </div>

              ${roomSpec ? `
                <div class="room-spec">
                  <div class="section-label">Room Specification</div>
                  ${roomSpec}
                </div>
              ` : ''}

              ${competitorNotes ? `
                <div class="room-spec">
                  <div class="section-label">Notes</div>
                  ${competitorNotes}
                </div>
              ` : ''}

              ${myNotes ? `
                <div class="notes-section">
                  <div class="section-label">My Notes</div>
                  ${myNotes}
                </div>
              ` : ''}

              <div class="pricing">
                <div class="price-row">
                  <span>Your Price per Unit:</span>
                  <span>$${myPrice.toFixed(2)}</span>
                </div>
                <div class="price-row">
                  <span>Competitor Price per Unit:</span>
                  <span>$${competitorPrice.toFixed(2)}</span>
                </div>
                <div class="price-row" style="border-top: 1px solid #e0e0e0; padding-top: 8px; margin-top: 8px;">
                  <span><strong>Your Total Price:</strong></span>
                  <span><strong>$${(myPrice * getFieldValue(product, 'Competitor Product Quantity', 1)).toFixed(2)}</strong></span>
                </div>
                <div class="price-row">
                  <span><strong>Competitor Total Price:</strong></span>
                  <span><strong>$${(competitorPrice * getFieldValue(product, 'Competitor Product Quantity', 1)).toFixed(2)}</strong></span>
                </div>
                <div class="${costDiff <= 0 ? 'savings' : 'loss'}">
                  ${costDiff <= 0 ? 'Savings' : 'Over'}: $${Math.abs(costDiff * getFieldValue(product, 'Competitor Product Quantity', 1)).toFixed(2)} (${Math.abs(savingsPercentage * 100).toFixed(1)}%)
                </div>
              </div>
              </div>
            </div>
          `;
        });

        card.innerHTML = optionsHtml;
        dashboard.appendChild(card);
      });

      // Populate sidebar with product names
      populateSidebar(sortedGroupNames);

      document.getElementById('mainWrapper').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'flex';
      updateSummary();
    }

    function populateSidebar(productNames) {
      const sidebarList = document.getElementById('sidebarList');
      sidebarList.innerHTML = '';

      productNames.forEach(name => {
        const li = document.createElement('li');
        const button = document.createElement('button');
        button.textContent = name || 'Unknown Product';
        button.onclick = () => scrollToProduct(name);
        button.className = 'sidebar-item';
        button.setAttribute('data-product', name);
        li.appendChild(button);
        sidebarList.appendChild(li);
      });
    }

    function scrollToProduct(productName) {
      setTimeout(() => {
        const productCards = document.querySelectorAll('.product-card');
        for (let card of productCards) {
          const header = card.querySelector('.card-header');
          if (header && header.textContent.trim() === productName) {
            header.scrollIntoView({ behavior: 'smooth', block: 'start' });
            updateActiveSidebar(productName);
            break;
          }
        }
      }, 100);
    }

    function updateActiveSidebar(productName) {
      document.querySelectorAll('.sidebar-item').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-product') === productName) {
          btn.classList.add('active');
        }
      });
    }

    function filterSidebar() {
      const searchInput = document.getElementById('sidebarSearch').value.toLowerCase();
      const sidebarButtons = document.querySelectorAll('.sidebar-item');

      sidebarButtons.forEach(btn => {
        const productName = btn.getAttribute('data-product').toLowerCase();
        if (productName.includes(searchInput)) {
          btn.parentElement.style.display = '';
        } else {
          btn.parentElement.style.display = 'none';
        }
      });
    }

    function toggleProduct(index, groupName) {
      if (selectedProducts[groupName] === index) {
        // Deselect if clicking the same option
        delete selectedProducts[groupName];
      } else {
        // Select this option (only one per group)
        selectedProducts[groupName] = index;
      }
      renderDashboard();
      updateSummary();
    }

    function updateSummary() {
      const summary = document.getElementById('summary');
      const summaryContent = document.getElementById('summaryContent');

      let totalYourPrice = 0;
      let totalCompetitorPrice = 0;
      let selectedCount = 0;
      let selectedItems = [];

      // Iterate through selected products (one per group)
      Object.keys(selectedProducts).forEach(groupName => {
        const index = selectedProducts[groupName];
        const product = allProducts[index];
        const fields = product.fields;
        const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown';
        const myPrice = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
        const competitorPrice = parseFloat(getFieldValue(product, 'Competitor Quoted Price + GST')) || 0;
        const quantity = parseFloat(getFieldValue(product, 'Competitor Product Quantity')) || 1;

        const yourTotal = myPrice * quantity;
        const competitorTotal = competitorPrice * quantity;

        totalYourPrice += yourTotal;
        totalCompetitorPrice += competitorTotal;
        selectedCount++;
        selectedItems.push({
          groupName: groupName,
          name: productName,
          yourPrice: myPrice,
          competitorPrice: competitorPrice,
          quantity: quantity,
          yourTotal: yourTotal,
          competitorTotal: competitorTotal
        });
      });

      const totalSavings = totalCompetitorPrice - totalYourPrice;
      const savingsPercent = totalCompetitorPrice > 0 ? (totalSavings / totalCompetitorPrice * 100).toFixed(1) : 0;

      let html = '<div class="summary-row"><span class="summary-label">Selected Products:</span><span class="summary-value">' + selectedCount + '</span></div>';

      selectedItems.forEach(item => {
        html += `
          <div class="summary-row">
            <span class="summary-label"><strong>${item.groupName}</strong></span>
          </div>
          <div class="summary-row" style="padding-left: 20px; font-size: 14px;">
            <span class="summary-label">${item.name} (Qty: ${item.quantity})</span>
            <span class="summary-value">$${item.yourTotal.toFixed(2)}</span>
          </div>
        `;
      });

      html += `
        <div class="total-row">
          <span>Total with Your Products:</span>
          <span>$${totalYourPrice.toFixed(2)}</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">Total with Competitor Products:</span>
          <span class="summary-value">$${totalCompetitorPrice.toFixed(2)}</span>
        </div>
        <div class="total-row">
          <span>Total Project Savings:</span>
          <span class="total-savings">$${totalSavings.toFixed(2)} (${savingsPercent}%)</span>
        </div>
        <div style="margin-top: 30px; padding-top: 20px; border-top: 2px solid #667eea;">
          <button onclick="downloadAndSubmit()" style="background: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%;">
            📥 Download Summary & Submit
          </button>
        </div>
      `;

      summaryContent.innerHTML = html;
      summary.style.display = selectedCount > 0 ? 'block' : 'none';
    }

    async function downloadAndSubmit() {
      // Collect selected products data
      const selectedData = {
        project: currentProject,
        selectedProducts: [],
        contactName: '',
        company: '',
        email: '',
        totals: {}
      };

      // Calculate totals and collect product info
      let totalYourPrice = 0;
      let totalCompetitorPrice = 0;

      Object.keys(selectedProducts).forEach(groupName => {
        const index = selectedProducts[groupName];
        const product = allProducts[index];
        const fields = product.fields;

        const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown';
        const myPrice = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
        const competitorPrice = parseFloat(getFieldValue(product, 'Competitor Quoted Price + GST')) || 0;
        const myTotal = (myPrice * (parseFloat(getFieldValue(product, 'Quantity')) || 1));
        const competitorTotal = (competitorPrice * (parseFloat(getFieldValue(product, 'Quantity')) || 1));

        selectedData.selectedProducts.push({
          name: productName,
          groupName: groupName,
          myPrice: myPrice,
          competitorPrice: competitorPrice,
          quantity: parseFloat(getFieldValue(product, 'Quantity')) || 1,
          myTotal: myTotal,
          competitorTotal: competitorTotal,
          room: getFieldValue(product, 'Room (from Competitor\'s Products)') || '',
          myNotes: getFieldValue(product, 'My Notes') || '',
          competitorNotes: getFieldValue(product, 'Competitor_Product_Notes') || '',
          myImages: getFieldValue(product, 'My Product Photos') || '',
          competitorImages: getFieldValue(product, 'Competitor Product Images') || ''
        });

        totalYourPrice += myTotal;
        totalCompetitorPrice += competitorTotal;
      });

      selectedData.totals = {
        yourTotal: totalYourPrice,
        competitorTotal: totalCompetitorPrice,
        savings: totalCompetitorPrice - totalYourPrice,
        savingsPercent: totalCompetitorPrice > 0 ? ((totalCompetitorPrice - totalYourPrice) / totalCompetitorPrice * 100).toFixed(1) : 0
      };

      // Get client info from URL or session
      const email = new URLSearchParams(window.location.search).get('email');

      try {
        // Fetch client info
        const clientResponse = await fetch(`${API_URL}/authenticate?email=${encodeURIComponent(email)}`);
        if (clientResponse.ok) {
          const clientData = await clientResponse.json();
          selectedData.contactName = clientData.contactName;
          selectedData.company = clientData.company;
          selectedData.email = email;
        }

        // Send to backend for PDF generation and email
        const response = await fetch(`${API_URL}/generate-summary`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(selectedData)
        });

        if (response.ok) {
          // Download PDF
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `summary_${currentProject}_${new Date().toISOString().split('T')[0]}.pdf`;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(url);
          document.body.removeChild(a);

          alert('✅ Summary downloaded and submitted! Check your email for confirmation.');
        } else {
          alert('❌ Error generating summary. Please try again.');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('❌ Error submitting summary: ' + error.message);
      }
    }

    // Fetch projects on page load
    fetchProjects();
  </script>
</body>
</html>
