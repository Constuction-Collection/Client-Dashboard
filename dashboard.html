<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Comparison Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f8f7f5;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      border-radius: 12px;
      padding: 40px;
      margin-bottom: 50px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 30px;
    }

    .header-logo {
      height: 70px;
      display: flex;
      align-items: center;
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .header-logo img {
      height: 100%;
      width: auto;
      object-fit: contain;
    }

    .header-title {
      flex: 1;
    }

    .company-name {
      color: #888;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    h1 {
      color: #ffffff;
      font-size: 36px;
      font-weight: 300;
      letter-spacing: -0.5px;
    }

    .project-selector {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .project-selector label {
      font-weight: 500;
      color: #e0e0e0;
      font-size: 15px;
    }

    .project-selector select {
      padding: 12px 16px;
      border: 1px solid #2d7a7a;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      background: white;
      color: #1a1a1a;
      transition: all 0.2s ease;
    }

    .project-selector select:hover,
    .project-selector select:focus {
      outline: none;
      border-color: #2d7a7a;
      box-shadow: 0 0 0 3px rgba(45, 122, 122, 0.1);
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .action-btn {
      padding: 12px 20px;
      background: #2d7a7a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      background: #245f5f;
      box-shadow: 0 4px 12px rgba(45, 122, 122, 0.3);
    }

    .action-btn:active {
      transform: translateY(1px);
    }

    .dashboard {
      display: flex;
      flex-direction: column;
      gap: 50px;
      margin-bottom: 50px;
    }

    .product-card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
    }

    .product-card:hover {
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 24px;
      font-weight: 400;
      color: #1a1a1a;
      margin-bottom: 35px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e0e0e0;
      letter-spacing: -0.3px;
    }

    .card-header-title {
      flex: 1;
    }

    .option-count-badge {
      background: #f0fafb;
      color: #2d7a7a;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: 1px solid #d0e8e8;
    }

    .options-container {
      border: 1px solid #d0e8e8;
      border-radius: 10px;
      padding: 0;
      margin-top: 20px;
      overflow: hidden;
    }

    .option-item {
      border: none;
      border-bottom: 1px solid #d0e8e8;
      border-radius: 0;
      padding: 25px;
      margin-bottom: 0;
      transition: all 0.3s ease;
      background: white;
    }

    .option-item-content {
      flex: 1;
    }

    .option-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .option-item.selected {
      background: #f0fafb;
    }

    .option-item.selected .option-header {
      color: #2d7a7a;
    }

    .option-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .option-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      flex: 1;
    }

    .product-name {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      flex: 1;
    }

    .select-btn {
      padding: 10px 20px;
      background: #2d7a7a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      font-size: 14px;
    }

    .select-btn:hover {
      background: #246565;
      box-shadow: 0 4px 12px rgba(45, 122, 122, 0.3);
    }

    .select-btn.selected {
      background: #2d7a7a;
    }

    .images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin: 30px 0;
    }

    .image-box {
      background: #fafaf9;
      border-radius: 10px;
      overflow: hidden;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .image-label {
      font-size: 13px;
      color: #888;
      text-align: center;
      font-weight: 400;
      display: block !important;
    }

    .images > div > .image-label:first-child {
      margin-bottom: 10px;
      font-size: 16px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .images > div > .image-label:last-child {
      margin-top: 12px;
    }

    .supplier-label {
      font-size: 11px;
      color: #999;
      text-align: center;
      margin-top: 3px;
    }

    .room-spec {
      background: #f8f7f5;
      border-left: 3px solid #2d7a7a;
      padding: 16px 20px;
      margin: 20px 0;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
    }

    .notes-section {
      background: #f9f8f6;
      border-left: 3px solid #d9a574;
      padding: 16px 20px;
      margin: 20px 0;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.8px;
    }

    .pricing {
      background: #f9fafb;
      border-left: 3px solid #2d7a7a;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      font-size: 14px;
      color: #333;
    }

    .savings {
      color: #2d7a7a;
      font-weight: 600;
      font-size: 15px;
      margin-top: 12px;
    }

    .loss {
      color: #d9534f;
      font-weight: 600;
      font-size: 15px;
      margin-top: 12px;
    }

    .summary {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .summary h2 {
      font-size: 28px;
      margin-bottom: 30px;
      color: #1a1a1a;
      font-weight: 400;
      letter-spacing: -0.3px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 15px;
    }

    .summary-row:last-child {
      border-bottom: none;
    }

    .summary-label {
      color: #666;
      font-weight: 400;
    }

    .summary-value {
      font-weight: 600;
      color: #1a1a1a;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 20px 0;
      margin-top: 20px;
      border-top: 1px solid #e0e0e0;
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .total-savings {
      color: #2d7a7a;
    }

    .main-wrapper {
      display: flex;
      gap: 30px;
      margin-top: 30px;
    }

    .sidebar {
      position: sticky;
      top: 20px;
      width: 260px;
      height: fit-content;
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      flex-shrink: 0;
    }

    .sidebar-search {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      box-sizing: border-box;
      transition: all 0.2s;
    }

    .sidebar-search:focus {
      outline: none;
      border-color: #2d7a7a;
      box-shadow: 0 0 0 3px rgba(45, 122, 122, 0.1);
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 15px;
      letter-spacing: 0.8px;
    }

    .sidebar-list {
      list-style: none;
      max-height: calc(100vh - 250px);
      overflow-y: auto;
    }

    .sidebar-list li {
      margin-bottom: 6px;
    }

    .sidebar-list button {
      width: 100%;
      padding: 11px 12px;
      background: #f5f5f5;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      font-size: 13px;
      color: #333;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .sidebar-list button:hover {
      background: #eef5f5;
      border-left-color: #2d7a7a;
    }

    .sidebar-list button.active {
      background: #eef5f5;
      border-left-color: #2d7a7a;
      font-weight: 600;
      color: #2d7a7a;
    }

    .content-wrapper {
      flex: 1;
    }

    .loading {
      text-align: center;
      color: #666;
      font-size: 16px;
    }

    .error {
      background: white;
      color: #d9534f;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 3px solid #d9534f;
    }

    @media (max-width: 768px) {
      .images {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .image-box {
        height: 250px;
      }

      h1 {
        font-size: 28px;
      }

      .header-content {
        flex-direction: column;
        align-items: flex-start;
      }

      .project-selector {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header" id="header" style="display: none;">
      <div class="header-content">
        <div class="header-logo">
          <img src="/cc-logo.png" alt="Construction Collection" onerror="this.style.display='none'">
        </div>
        <div class="header-title">
          <div class="company-name">Construction Collection</div>
          <h1 id="pageTitle">Product Comparison & Selection</h1>
        </div>
      </div>
      <div class="project-selector">
        <label for="projectSelect">Select Project:</label>
        <select id="projectSelect" onchange="changeProject()">
          <option value="">-- Choose a project --</option>
        </select>
      </div>
      <div class="header-actions">
        <button class="action-btn" onclick="exportPDF()">Export PDF</button>
        <button class="action-btn" onclick="generateShareLink()">Share Project</button>
      </div>
    </div>

    <div id="loading" class="loading">Loading projects...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div class="main-wrapper" id="mainWrapper" style="display: none;">
      <div class="sidebar">
        <div class="sidebar-title">Products</div>
        <ul class="sidebar-list" id="sidebarList"></ul>
      </div>
      <div class="content-wrapper">
        <div class="dashboard" id="dashboard"></div>
        <div class="summary" id="summary" style="display: none;">
          <h2>Project Summary</h2>
          <div id="summaryContent"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Dynamically construct API URL based on current domain
    const API_URL = window.location.origin === 'http://localhost:3000'
      ? 'http://localhost:3000/api'
      : 'https://client-dashboard-ugki.onrender.com/api';
    let allProducts = [];
    let selectedProducts = {}; // Track multiple selections for samples
    let selectedForCost = {}; // Track which option is used for cost calculation (one per group)
    let currentProject = null;

    // Get project from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const urlProject = urlParams.get('project');

    async function fetchProjects() {
      try {
        // Check if email is in URL - required for authentication
        const email = new URLSearchParams(window.location.search).get('email');

        if (!email) {
          // No email - cannot proceed without authentication
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent = 'Please login with your email first.';
          return;
        }

        // If a project is in the URL, skip the dropdown and load products directly
        if (urlProject) {
          fetchProductsForProject(urlProject);
          return;
        }

        // Fetch ONLY this client's projects (filtered by email)
        const response = await fetch(`${API_URL}/client-projects?email=${encodeURIComponent(email)}`);
        if (!response.ok) throw new Error('Failed to fetch projects');

        const projects = await response.json();
        populateProjectDropdown(projects);

        document.getElementById('header').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading projects: ' + error.message;
      }
    }

    function populateProjectDropdown(projects) {
      const select = document.getElementById('projectSelect');
      projects.forEach(project => {
        const option = document.createElement('option');
        const projectName = typeof project === 'string' ? project : project.name;
        option.value = projectName;
        option.textContent = projectName;
        select.appendChild(option);
      });
    }

    function changeProject() {
      const projectSelect = document.getElementById('projectSelect');
      const selectedProject = projectSelect.value;
      if (selectedProject) {
        fetchProductsForProject(selectedProject);
        window.history.pushState({}, '', `?project=${encodeURIComponent(selectedProject)}`);
      }
    }

    async function fetchProductsForProject(projectName) {
      try {
        currentProject = projectName;
        selectedProducts = {}; // Reset selections
        selectedForCost = {}; // Reset cost selections

        const response = await fetch(`${API_URL}/products?project=${encodeURIComponent(projectName)}`);
        if (!response.ok) throw new Error('Failed to fetch products');

        allProducts = await response.json();

        // If project was passed via URL, show a simple title instead of the dropdown
        if (urlProject) {
          const header = document.getElementById('header');
          document.getElementById('pageTitle').textContent = projectName;
          header.style.display = 'block';
        }

        renderDashboard();
        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading products: ' + error.message;
      }
    }

    function getFieldValue(record, fieldName) {
      if (!record.fields) return null;
      return record.fields[fieldName];
    }

    function getImageUrl(imageArray) {
      if (Array.isArray(imageArray) && imageArray.length > 0) {
        return imageArray[0].url;
      }
      return null;
    }

    function renderDashboard() {
      const dashboard = document.getElementById('dashboard');
      dashboard.innerHTML = '';

      if (allProducts.length === 0) {
        dashboard.innerHTML = '<div style="color: #666; text-align: center; padding: 40px;">No products found for this project.</div>';
        dashboard.style.display = 'flex';
        return;
      }

      // Group products by competitor product (enriched from backend)
      const groupedProducts = {};
      allProducts.forEach((product, index) => {
        const groupName = product.fields['Competitor_Product_Name_Text'] || 'Unknown Group';
        if (!groupedProducts[groupName]) {
          groupedProducts[groupName] = [];
        }
        groupedProducts[groupName].push({ product, index });
      });

      // Sort groups alphabetically
      const sortedGroupNames = Object.keys(groupedProducts).sort();

      // Create cards for each group
      sortedGroupNames.forEach(groupName => {
        const options = groupedProducts[groupName];
        const card = document.createElement('div');
        card.className = 'product-card';

        const optionCount = options.length;
        const selectedCount = selectedProducts[groupName] ? selectedProducts[groupName].length : 0;
        let optionsHtml = `
          <div class="card-header">
            <div class="card-header-title">${groupName}</div>
            <div class="option-count-badge">Select from ${optionCount} ${selectedCount > 0 ? `(${selectedCount} selected)` : ''}</div>
          </div>
          <div class="options-container">
        `;

        options.forEach(({ product, index }) => {
          const fields = product.fields;
          const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown Product';
          const myPrice = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
          const competitorPrice = parseFloat(getFieldValue(product, 'Competitor Quoted Price + GST')) || 0;
          const costDiff = parseFloat(getFieldValue(product, 'Cost Difference')) || (myPrice - competitorPrice);
          const savingsPercentage = parseFloat(getFieldValue(product, 'Savings Percentage')) || 0;

          const myImages = getFieldValue(product, 'My Product Photos');
          const competitorImages = getFieldValue(product, 'Competitor Product Images');
          const mySupplier = getFieldValue(product, 'My Supplier') || 'N/A';
          const roomSpec = getFieldValue(product, 'Room (from Competitor\'s Products)') || '';
          const mySize = getFieldValue(product, 'My Size') || '';
          const competitorSize = getFieldValue(product, 'Competitor_Product_Size') || '';
          const competitorNotes = getFieldValue(product, 'Competitor_Product_Notes') || '';
          const myNotes = getFieldValue(product, 'My Notes') || '';
          const competitorSupplier = getFieldValue(product, 'Competitor Supplier Name') || 'N/A';

          const isSelected = selectedProducts[groupName] && selectedProducts[groupName].includes(index);
          const optionClass = isSelected ? 'option-item selected' : 'option-item';

          optionsHtml += `
            <div class="${optionClass}" id="option-${index}">
              <div class="option-header">
                <button class="select-btn ${isSelected ? 'selected' : ''}" onclick="toggleProduct(${index}, '${groupName}')">
                  ${isSelected ? '✓ Selected' : 'Select'}
                </button>
              </div>

              <div class="option-item-content">
                <div class="images">
                <div>
                  <div class="image-label">${groupName}</div>
                  <div class="image-box">
                    ${competitorImages ? `<img src="${getImageUrl(competitorImages)}" alt="Competitor">` : '<div style="color: #ccc;">No Image</div>'}
                  </div>
                  <div class="image-label">Competitor Product</div>
                </div>
                <div>
                  <div class="image-label">${productName}</div>
                  <div class="image-box">
                    ${myImages ? `<img src="${getImageUrl(myImages)}" alt="My Product">` : '<div style="color: #ccc;">No Image</div>'}
                  </div>
                  <div class="image-label">Our Product</div>
                </div>
              </div>

              ${roomSpec ? `
                <div class="room-spec">
                  <div class="section-label">Room Specification</div>
                  ${roomSpec}
                </div>
              ` : ''}

              ${mySize || competitorSize ? `
                <div class="room-spec">
                  <div style="display: flex; gap: 0;">
                    <div style="flex: 1; padding-right: 20px; border-right: 1px solid #e0e0e0;">
                      <div class="section-label">Specified Size</div>
                      <div>${competitorSize || ''}</div>
                    </div>
                    <div style="flex: 1; padding-left: 20px;">
                      <div class="section-label">My Size</div>
                      <div>${mySize || ''}</div>
                    </div>
                  </div>
                </div>
              ` : ''}

              ${competitorNotes ? `
                <div class="room-spec">
                  <div class="section-label">Notes</div>
                  ${competitorNotes}
                </div>
              ` : ''}

              ${myNotes ? `
                <div class="notes-section">
                  <div class="section-label">My Notes</div>
                  ${myNotes}
                </div>
              ` : ''}

              <div class="pricing">
                <div class="price-row">
                  <span>Your Price per Unit:</span>
                  <span>$${myPrice.toFixed(2)}</span>
                </div>
                <div class="price-row">
                  <span>Competitor Price per Unit:</span>
                  <span>$${competitorPrice.toFixed(2)}</span>
                </div>
                <div class="price-row" style="border-top: 1px solid #e0e0e0; padding-top: 8px; margin-top: 8px;">
                  <span><strong>Your Total Price:</strong></span>
                  <span><strong>$${(myPrice * getFieldValue(product, 'Competitor Product Quantity', 1)).toFixed(2)}</strong></span>
                </div>
                <div class="price-row">
                  <span><strong>Competitor Total Price:</strong></span>
                  <span><strong>$${(competitorPrice * getFieldValue(product, 'Competitor Product Quantity', 1)).toFixed(2)}</strong></span>
                </div>
                <div class="${costDiff <= 0 ? 'savings' : 'loss'}">
                  ${costDiff <= 0 ? 'Savings' : 'Over'}: $${Math.abs(costDiff * getFieldValue(product, 'Competitor Product Quantity', 1)).toFixed(2)} (${Math.abs(savingsPercentage * 100).toFixed(1)}%)
                </div>
              </div>
              </div>
            </div>
          `;
        });

        optionsHtml += `</div>`; // Close options-container

        card.innerHTML = optionsHtml;
        dashboard.appendChild(card);
      });

      // Populate sidebar with product names
      populateSidebar(sortedGroupNames);

      document.getElementById('mainWrapper').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'flex';
      updateSummary();
    }

    function populateSidebar(productNames) {
      const sidebarList = document.getElementById('sidebarList');
      sidebarList.innerHTML = '';

      productNames.forEach(name => {
        const li = document.createElement('li');
        const button = document.createElement('button');
        button.textContent = name || 'Unknown Product';
        button.onclick = () => scrollToProduct(name);
        button.className = 'sidebar-item';
        button.setAttribute('data-product', name);
        li.appendChild(button);
        sidebarList.appendChild(li);
      });
    }

    function scrollToProduct(productName) {
      setTimeout(() => {
        const productCards = document.querySelectorAll('.product-card');
        for (let card of productCards) {
          const header = card.querySelector('.card-header');
          if (header && header.textContent.trim() === productName) {
            header.scrollIntoView({ behavior: 'smooth', block: 'start' });
            updateActiveSidebar(productName);
            break;
          }
        }
      }, 100);
    }

    function updateActiveSidebar(productName) {
      document.querySelectorAll('.sidebar-item').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-product') === productName) {
          btn.classList.add('active');
        }
      });
    }

    function filterSidebar() {
      const searchInput = document.getElementById('sidebarSearch').value.toLowerCase();
      const sidebarButtons = document.querySelectorAll('.sidebar-item');

      sidebarButtons.forEach(btn => {
        const productName = btn.getAttribute('data-product').toLowerCase();
        if (productName.includes(searchInput)) {
          btn.parentElement.style.display = '';
        } else {
          btn.parentElement.style.display = 'none';
        }
      });
    }

    function toggleProduct(index, groupName) {
      // Initialize as array if not exists
      if (!selectedProducts[groupName]) {
        selectedProducts[groupName] = [];
      }

      const selectedArray = selectedProducts[groupName];
      const indexPosition = selectedArray.indexOf(index);

      if (indexPosition > -1) {
        // Already selected - remove it
        selectedArray.splice(indexPosition, 1);
      } else {
        // Not selected - add it
        selectedArray.push(index);
      }

      // Clean up empty arrays
      if (selectedArray.length === 0) {
        delete selectedProducts[groupName];
      }

      renderDashboard();
      updateSummary();
    }

    function setOptionForCost(groupName, index) {
      selectedForCost[groupName] = index;
      updateSummary();
    }

    function updateSummary() {
      const summary = document.getElementById('summary');
      const summaryContent = document.getElementById('summaryContent');

      let totalYourPrice = 0;
      let totalCompetitorPrice = 0;
      let selectedCount = 0;
      let selectedItems = [];
      let costSelectionItems = {};

      // Collect all samples
      Object.keys(selectedProducts).forEach(groupName => {
        const selectedIndices = selectedProducts[groupName];
        costSelectionItems[groupName] = selectedIndices;

        selectedIndices.forEach(index => {
          const product = allProducts[index];
          const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown';
          selectedCount++;
          selectedItems.push({
            groupName: groupName,
            name: productName,
            index: index
          });
        });
      });

      // Calculate totals based on selectedForCost (one option per group)
      Object.keys(costSelectionItems).forEach(groupName => {
        const costIndex = selectedForCost[groupName];
        const indexToUse = costIndex !== undefined ? costIndex : costSelectionItems[groupName][0];

        const product = allProducts[indexToUse];
        const myPrice = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
        const competitorPrice = parseFloat(getFieldValue(product, 'Competitor Quoted Price + GST')) || 0;
        const quantity = parseFloat(getFieldValue(product, 'Competitor Product Quantity')) || 1;

        const yourTotal = myPrice * quantity;
        const competitorTotal = competitorPrice * quantity;

        totalYourPrice += yourTotal;
        totalCompetitorPrice += competitorTotal;
      });

      const totalSavings = totalCompetitorPrice - totalYourPrice;
      const savingsPercent = totalCompetitorPrice > 0 ? (totalSavings / totalCompetitorPrice * 100).toFixed(1) : 0;

      let html = '<div class="summary-row"><span class="summary-label">Samples to Order:</span><span class="summary-value">' + selectedCount + '</span></div>';

      selectedItems.forEach(item => {
        html += `
          <div class="summary-row" style="padding-left: 20px; font-size: 13px;">
            <span class="summary-label">${item.groupName} - ${item.name}</span>
          </div>
        `;
      });

      html += '<div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #2d7a7a;"><div class="summary-label" style="margin-bottom: 15px; font-weight: 600; color: #1a1a1a;">Choose option for project total:</div>';

      // Show cost selection options (only if multiple options)
      Object.keys(costSelectionItems).forEach(groupName => {
        const selectedIndices = costSelectionItems[groupName];

        // Only show if there are multiple options
        if (selectedIndices.length > 1) {
          html += `<div style="margin-bottom: 18px;"><div style="font-weight: 500; margin-bottom: 10px; color: #2d7a7a;">${groupName}</div>`;

          selectedIndices.forEach(index => {
            const product = allProducts[index];
            const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown';
            const myPrice = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
            const isSelected = selectedForCost[groupName] === index;

            html += `
              <div style="margin-left: 10px; margin-bottom: 8px;">
                <input type="radio" id="cost-option-${index}" name="cost-${groupName}" value="${index}" ${isSelected ? 'checked' : ''} onchange="setOptionForCost('${groupName}', ${index})">
                <label for="cost-option-${index}" style="margin-left: 8px; cursor: pointer; color: #333;">${productName} - $${myPrice.toFixed(2)}</label>
              </div>
            `;
          });
          html += '</div>';
        } else if (selectedIndices.length === 1 && !selectedForCost[groupName]) {
          // Auto-select if only one option
          selectedForCost[groupName] = selectedIndices[0];
        }
      });

      html += '</div>';

      html += `
        <div class="total-row">
          <span>Total with Your Products:</span>
          <span>$${totalYourPrice.toFixed(2)}</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">Total with Competitor Products:</span>
          <span class="summary-value">$${totalCompetitorPrice.toFixed(2)}</span>
        </div>
        <div class="total-row">
          <span>Total Project Savings:</span>
          <span class="total-savings">$${totalSavings.toFixed(2)} (${savingsPercent}%)</span>
        </div>
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0;">
          <button onclick="downloadAndSubmit()" style="background: #2d7a7a; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; transition: all 0.2s;">
            📥 Download Summary & Submit
          </button>
        </div>
      `;

      summaryContent.innerHTML = html;
      summary.style.display = selectedCount > 0 ? 'block' : 'none';
    }

    async function downloadAndSubmit() {
      // Collect selected products data
      const selectedData = {
        project: currentProject,
        selectedProducts: [],
        contactName: '',
        company: '',
        email: '',
        totals: {}
      };

      // Calculate totals and collect product info
      let totalYourPrice = 0;
      let totalCompetitorPrice = 0;

      Object.keys(selectedProducts).forEach(groupName => {
        const selectedIndices = selectedProducts[groupName];

        selectedIndices.forEach(index => {
          const product = allProducts[index];
          const fields = product.fields;

          const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown';
          const myPrice = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
          const competitorPrice = parseFloat(getFieldValue(product, 'Competitor Quoted Price + GST')) || 0;
          const myTotal = (myPrice * (parseFloat(getFieldValue(product, 'Quantity')) || 1));
          const competitorTotal = (competitorPrice * (parseFloat(getFieldValue(product, 'Quantity')) || 1));

          selectedData.selectedProducts.push({
            name: productName,
            groupName: groupName,
            myPrice: myPrice,
            competitorPrice: competitorPrice,
            quantity: parseFloat(getFieldValue(product, 'Quantity')) || 1,
            myTotal: myTotal,
          competitorTotal: competitorTotal,
          room: getFieldValue(product, 'Room (from Competitor\'s Products)') || '',
          myNotes: getFieldValue(product, 'My Notes') || '',
          competitorNotes: getFieldValue(product, 'Competitor_Product_Notes') || '',
          myImages: getFieldValue(product, 'My Product Photos') || '',
          competitorImages: getFieldValue(product, 'Competitor Product Images') || ''
        });

          totalYourPrice += myTotal;
          totalCompetitorPrice += competitorTotal;
        });
      });

      selectedData.totals = {
        yourTotal: totalYourPrice,
        competitorTotal: totalCompetitorPrice,
        savings: totalCompetitorPrice - totalYourPrice,
        savingsPercent: totalCompetitorPrice > 0 ? ((totalCompetitorPrice - totalYourPrice) / totalCompetitorPrice * 100).toFixed(1) : 0
      };

      // Get client info from URL or session
      const email = new URLSearchParams(window.location.search).get('email');

      try {
        // Fetch client info
        const clientResponse = await fetch(`${API_URL}/authenticate?email=${encodeURIComponent(email)}`);
        if (clientResponse.ok) {
          const clientData = await clientResponse.json();
          selectedData.contactName = clientData.contactName;
          selectedData.company = clientData.company;
          selectedData.email = email;
        }

        // Send to backend for PDF generation and email
        const response = await fetch(`${API_URL}/generate-summary`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(selectedData)
        });

        if (response.ok) {
          // Download PDF
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `summary_${currentProject}_${new Date().toISOString().split('T')[0]}.pdf`;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(url);
          document.body.removeChild(a);

          alert('✅ Summary downloaded and submitted! Check your email for confirmation.');
        } else {
          alert('❌ Error generating summary. Please try again.');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('❌ Error submitting summary: ' + error.message);
      }
    }

    // Fetch projects on page load
    fetchProjects();

    // Export to PDF
    function exportPDF() {
      const projectName = document.getElementById('projectSelect').value;
      if (!projectName) {
        alert('Please select a project first');
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const email = params.get('email');

      window.location.href = `/api/generate-summary?email=${encodeURIComponent(email)}&project=${encodeURIComponent(projectName)}&excludePricing=true`;
    }

    // Generate share link
    function generateShareLink() {
      const projectName = document.getElementById('projectSelect').value;
      if (!projectName) {
        alert('Please select a project first');
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const email = params.get('email');

      fetch(`${API_URL}/generate-share-link`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, project: projectName })
      })
      .then(res => res.json())
      .then(data => {
        if (data.shareUrl) {
          const url = data.shareUrl;
          navigator.clipboard.writeText(url).then(() => {
            alert(`Share link copied to clipboard!\n\n${url}`);
          }).catch(() => {
            alert(`Share link generated:\n\n${url}`);
          });
        } else {
          alert('Error generating share link');
        }
      })
      .catch(err => alert('Error: ' + err.message));
    }
  </script>
</body>
