<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Sourcing Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f8f7f5;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      border-radius: 12px;
      padding: 40px;
      margin-bottom: 50px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 30px;
    }

    .header-logo {
      height: 70px;
      display: flex;
      align-items: center;
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .header-logo img {
      height: 100%;
      width: auto;
      object-fit: contain;
    }

    .header-title {
      flex: 1;
    }

    .company-name {
      color: #888;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    h1 {
      color: #ffffff;
      font-size: 36px;
      font-weight: 300;
      letter-spacing: -0.5px;
    }

    .project-selector {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .project-selector label {
      font-weight: 500;
      color: #e0e0e0;
      font-size: 15px;
    }

    .project-selector select {
      padding: 12px 16px;
      border: 1px solid #2d7a7a;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      background: white;
      color: #1a1a1a;
      transition: all 0.2s ease;
    }

    .project-selector select:hover,
    .project-selector select:focus {
      border-color: #2d7a7a;
      box-shadow: 0 0 0 3px rgba(45, 122, 122, 0.1);
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      margin-bottom: 40px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 24px;
      font-weight: 400;
      color: #1a1a1a;
      margin-bottom: 35px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e0e0e0;
      letter-spacing: -0.3px;
    }

    .option-count-badge {
      background: #2d7a7a;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .option-item {
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 30px;
      background: #fafaf9;
      transition: all 0.3s ease;
    }

    .option-item:hover {
      border-color: #2d7a7a;
      background: #f0fafb;
    }

    .option-item.selected {
      background: #f0fafb;
    }

    .option-item.selected .option-header {
      color: #2d7a7a;
    }

    .option-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .product-name {
      font-weight: 600;
      color: #333;
      flex: 1;
    }

    .select-btn {
      padding: 10px 20px;
      background: #2d7a7a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      font-size: 14px;
    }

    .select-btn:hover {
      background: #246565;
      box-shadow: 0 4px 12px rgba(45, 122, 122, 0.3);
    }

    .select-btn.selected {
      background: #2d7a7a;
    }

    .product-thumbnails {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      justify-content: center;
    }

    .product-thumbnail {
      width: 60px;
      height: 60px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafaf9;
    }

    .product-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .product-thumbnail:hover {
      border-color: #2d7a7a;
      box-shadow: 0 2px 8px rgba(45, 122, 122, 0.2);
    }

    .product-thumbnail.active {
      border-color: #2d7a7a;
      box-shadow: 0 0 0 2px rgba(45, 122, 122, 0.3);
    }

    .images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin: 30px 0;
    }

    .image-box {
      background: #fafaf9;
      border-radius: 10px;
      overflow: hidden;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .image-label {
      font-size: 13px;
      color: #888;
      text-align: center;
      font-weight: 400;
      display: block !important;
    }

    .images > div > .image-label:first-child {
      margin-bottom: 10px;
      font-size: 16px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .images > div > .image-label:last-child {
      margin-top: 12px;
    }

    .product-thumbnails {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: center;
    }

    .product-thumbnail {
      width: 60px;
      height: 60px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .product-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-thumbnail.active {
      border-color: #2d7a7a;
      box-shadow: 0 0 0 2px rgba(45, 122, 122, 0.3);
    }

    .product-thumbnail:hover {
      border-color: #2d7a7a;
    }

    .option-item-content {
      display: flex;
      flex-direction: column;
    }

    .product-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .info-row {
      display: flex;
      flex-direction: column;
    }

    .info-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 15px;
      color: #1a1a1a;
      font-weight: 400;
    }

    .pricing-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      font-size: 15px;
    }

    .price-row span:first-child {
      color: #666;
    }

    .price-row span:last-child {
      color: #1a1a1a;
      font-weight: 500;
    }

    .cost-selection {
      margin-top: 30px;
      padding: 20px;
      background: #f8f7f5;
      border-radius: 8px;
    }

    .cost-selection-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 15px;
      letter-spacing: 0.5px;
    }

    .cost-option {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      cursor: pointer;
    }

    .cost-option input[type="radio"] {
      margin-right: 10px;
      cursor: pointer;
    }

    .cost-option label {
      cursor: pointer;
      flex: 1;
      margin: 0;
    }

    .my-notes {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .my-notes-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .my-notes-content {
      font-size: 15px;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .main-wrapper {
      display: flex;
      gap: 30px;
      margin-top: 30px;
    }

    .sidebar {
      position: sticky;
      top: 20px;
      width: 260px;
      background: #f5f5f5;
      padding: 20px;
      border-radius: 10px;
      height: fit-content;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 15px;
      letter-spacing: 0.8px;
    }

    .sidebar-list {
      list-style: none;
      max-height: calc(100vh - 250px);
      overflow-y: auto;
    }

    .sidebar-list li {
      margin-bottom: 6px;
    }

    .sidebar-list button {
      width: 100%;
      padding: 11px 12px;
      background: #f5f5f5;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      color: #666;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .sidebar-list button:hover {
      background: #eef5f5;
      border-left-color: #2d7a7a;
    }

    .sidebar-list button.active {
      background: #eef5f5;
      border-left-color: #2d7a7a;
      font-weight: 600;
    }

    .content-wrapper {
      flex: 1;
    }

    .summary-section {
      margin-top: 50px;
    }

    .summary-header {
      font-size: 24px;
      font-weight: 400;
      color: #1a1a1a;
      margin-bottom: 30px;
      letter-spacing: -0.3px;
    }

    .summary-items {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: #f8f7f5;
      border-radius: 8px;
      border-left: 4px solid #2d7a7a;
    }

    .summary-item-name {
      color: #1a1a1a;
      font-weight: 500;
    }

    .summary-item-price {
      color: #1a1a1a;
      font-weight: 600;
    }

    .action-buttons {
      display: flex;
      gap: 15px;
      margin-top: 40px;
    }

    .btn {
      flex: 1;
      padding: 16px 32px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .btn-primary {
      background: #2d7a7a;
      color: white;
    }

    .btn-primary:hover {
      background: #245f5f;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(45, 122, 122, 0.2);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .header {
        padding: 25px;
      }

      h1 {
        font-size: 28px;
      }

      .card {
        padding: 25px;
      }

      .images {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .image-box {
        height: 250px;
      }

      .product-info {
        grid-template-columns: 1fr;
      }

      .action-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <div class="header-logo">
          <img src="/cc-logo.png" alt="Construction Collection">
        </div>
        <div class="header-title">
          <div class="company-name">Construction Collection</div>
          <h1>Product Sourcing</h1>
        </div>
      </div>
    </div>

    <div class="main-wrapper" id="mainWrapper">
      <div class="sidebar">
        <div class="sidebar-title">Products</div>
        <ul class="sidebar-list" id="sidebarList"></ul>
      </div>
      <div class="content-wrapper">
        <div id="dashboardContent"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin === 'http://localhost:3000'
      ? 'http://localhost:3000/api'
      : 'https://client-dashboard-ugki.onrender.com/api';

    let currentEmail = '';
    let currentProject = '';
    let groupedProducts = {};
    let selectedProducts = {};
    let costSelection = {};

    function getImageUrl(images) {
      if (!images) return null;
      if (Array.isArray(images)) {
        return images[0]?.url || null;
      }
      return images.url || null;
    }

    function getFieldValue(record, fieldName) {
      if (!record.fields) return null;
      return record.fields[fieldName] || null;
    }

    function switchCompetitorImage(index, imageIdx) {
      const options = Object.values(groupedProducts).flat();
      const option = options.find(o => options.indexOf(o) === index);
      if (!option) return;

      const competitorImages = getFieldValue(option.product, 'Competitor Product Images');
      if (!competitorImages || !Array.isArray(competitorImages)) return;

      const mainImg = document.getElementById(`competitorImg-${index}`);
      if (mainImg) {
        mainImg.src = competitorImages[imageIdx].url;
      }

      const thumbnails = document.querySelectorAll(`#competitorThumbnails-${index} .product-thumbnail`);
      thumbnails.forEach((thumb, idx) => {
        thumb.classList.toggle('active', idx === imageIdx);
      });
    }

    function switchMyImage(index, imageIdx) {
      const options = Object.values(groupedProducts).flat();
      const option = options.find(o => options.indexOf(o) === index);
      if (!option) return;

      const myImages = getFieldValue(option.product, 'My Product Photos');
      if (!myImages || !Array.isArray(myImages)) return;

      const mainImg = document.getElementById(`myImg-${index}`);
      if (mainImg) {
        mainImg.src = myImages[imageIdx].url;
      }

      const thumbnails = document.querySelectorAll(`#myThumbnails-${index} .product-thumbnail`);
      thumbnails.forEach((thumb, idx) => {
        thumb.classList.toggle('active', idx === imageIdx);
      });
    }

    async function loadDashboard() {
      const params = new URLSearchParams(window.location.search);
      currentEmail = params.get('email');
      currentProject = params.get('project');

      if (!currentEmail || !currentProject) {
        document.getElementById('dashboardContent').innerHTML = '<div class="error">Missing email or project parameters</div>';
        return;
      }

      try {
        document.getElementById('dashboardContent').innerHTML = '<div class="loading">Loading dashboard...</div>';

        const response = await fetch(`${API_URL}/products?email=${encodeURIComponent(currentEmail)}&project=${encodeURIComponent(currentProject)}`);
        if (!response.ok) throw new Error('Failed to load products');

        const products = await response.json();
        groupedProducts = {};

        products.forEach(product => {
          const groupName = getFieldValue(product, 'My Product Suggestion') || 'Unknown';
          if (!groupedProducts[groupName]) {
            groupedProducts[groupName] = [];
          }
          groupedProducts[groupName].push({ product, index: products.indexOf(product) });
        });

        renderDashboard();
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('dashboardContent').innerHTML = `<div class="error">Error loading dashboard: ${error.message}</div>`;
      }
    }

    function renderDashboard() {
      let html = `<div class="card">
        <div class="card-header">
          <span>${currentProject}</span>
        </div>`;

      let productSidebarHtml = '';

      Object.entries(groupedProducts).forEach(([groupName, options]) => {
        const selectedCount = selectedProducts[groupName] ? selectedProducts[groupName].length : 0;

        html += `
          <div class="card-header">
            <span>${groupName}</span>
            <span class="option-count-badge">Select from ${options.length}</span>
          </div>
          <div class="options-container" id="options-${groupName}">`;

        options.forEach(({ product, index }) => {
          const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown Product';
          productSidebarHtml += `<li><button class="sidebar-item" data-product-index="${index}" onclick="scrollToProduct(${index})">${productName}</button></li>`;

          const price = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
          const budgetPrice = parseFloat(getFieldValue(product, 'Competitor Quoted Price + GST')) || 0;
          const quantity = parseFloat(getFieldValue(product, 'Competitor Product Quantity')) || 1;
          const room = getFieldValue(product, 'Room (from Competitor\'s Products)') || '';
          const mySize = getFieldValue(product, 'Size') || '';
          const myImages = getFieldValue(product, 'My Product Photos');
          const competitorImages = getFieldValue(product, 'Competitor Product Images');
          const myNotes = getFieldValue(product, 'My Notes') || '';

          const totalPrice = price * quantity;
          const budgetTotal = budgetPrice * quantity;
          const isSelected = selectedProducts[groupName] && selectedProducts[groupName].includes(index);
          const optionClass = isSelected ? 'option-item selected' : 'option-item';

          html += `
            <div class="${optionClass}" id="product-${index}">
              <div class="option-header">
                <button class="select-btn ${isSelected ? 'selected' : ''}" onclick="toggleProduct(${index}, '${groupName}')">
                  ${isSelected ? '✓ Selected' : 'Select'}
                </button>
              </div>

              <div class="option-item-content">
                <div class="images">
                  <div>
                    <div class="image-label">${groupName}</div>
                    <div class="image-box" id="competitorImage-${index}">
                      ${competitorImages ? `<img src="${getImageUrl(competitorImages)}" alt="Inspiration" id="competitorImg-${index}">` : '<div style="color: #ccc;">No Image</div>'}
                    </div>
                    ${competitorImages && Array.isArray(competitorImages) && competitorImages.length > 1 ? `
                      <div class="product-thumbnails" id="competitorThumbnails-${index}">
                        ${competitorImages.map((img, imgIdx) => `
                          <div class="product-thumbnail ${imgIdx === 0 ? 'active' : ''}" onclick="switchCompetitorImage(${index}, ${imgIdx})" title="Image ${imgIdx + 1}">
                            <img src="${img.url}" alt="Image ${imgIdx + 1}">
                          </div>
                        `).join('')}
                      </div>
                    ` : ''}
                    <div class="image-label">Inspiration Image</div>
                  </div>
                  <div>
                    <div class="image-label">${productName}</div>
                    <div class="image-box" id="myImage-${index}">
                      ${myImages ? `<img src="${getImageUrl(myImages)}" alt="My Product" id="myImg-${index}">` : '<div style="color: #ccc;">No Image</div>'}
                    </div>
                    ${myImages && Array.isArray(myImages) && myImages.length > 1 ? `
                      <div class="product-thumbnails" id="myThumbnails-${index}">
                        ${myImages.map((img, imgIdx) => `
                          <div class="product-thumbnail ${imgIdx === 0 ? 'active' : ''}" onclick="switchMyImage(${index}, ${imgIdx})" title="Image ${imgIdx + 1}">
                            <img src="${img.url}" alt="Image ${imgIdx + 1}">
                          </div>
                        `).join('')}
                      </div>
                    ` : ''}
                    <div class="image-label">My Product</div>
                  </div>
                </div>

                <div class="product-info">
                  ${room ? `<div class="info-row"><div class="info-label">Area/Room</div><div class="info-value">${room}</div></div>` : ''}
                  ${mySize ? `<div class="info-row"><div class="info-label">Specified Size</div><div class="info-value">${mySize}</div></div>` : ''}
                  <div class="info-row"><div class="info-label">Quantity</div><div class="info-value">${quantity}</div></div>
                </div>

                <div class="pricing-section">
                  <div class="price-row">
                    <span>Your Price per Unit:</span>
                    <span>$${price.toFixed(2)}</span>
                  </div>
                  <div class="price-row">
                    <span>Budgeted Price per Unit:</span>
                    <span>$${budgetPrice.toFixed(2)}</span>
                  </div>
                  <div class="price-row" style="border-top: 1px solid #e0e0e0; padding-top: 8px; margin-top: 8px;">
                    <span><strong>Your Total Price:</strong></span>
                    <span><strong>$${totalPrice.toFixed(2)}</strong></span>
                  </div>
                  <div class="price-row">
                    <span><strong>Budgeted Total Price:</strong></span>
                    <span><strong>$${budgetTotal.toFixed(2)}</strong></span>
                  </div>
                </div>

                ${myNotes ? `
                  <div class="my-notes">
                    <div class="my-notes-label">My Notes</div>
                    <div class="my-notes-content">${myNotes}</div>
                  </div>
                ` : ''}
              </div>
            </div>`;
        });

        html += `</div>`;
      });

      html += `
        <div class="action-buttons">
          <button class="btn btn-primary" onclick="downloadAndSubmit()">Generate PDF & Submit</button>
        </div>
      </div>`;

      document.getElementById('dashboardContent').innerHTML = html;
      document.getElementById('sidebarList').innerHTML = productSidebarHtml;
    }

    function scrollToProduct(index) {
      setTimeout(() => {
        const productElement = document.getElementById(`product-${index}`);
        if (productElement) {
          productElement.scrollIntoView({ behavior: 'smooth', block: 'start' });

          // Update active state in sidebar
          document.querySelectorAll('.sidebar-item').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-product-index') == index) {
              btn.classList.add('active');
            }
          });
        }
      }, 100);
    }

    function toggleProduct(index, groupName) {
      if (!selectedProducts[groupName]) {
        selectedProducts[groupName] = [];
      }

      const position = selectedProducts[groupName].indexOf(index);
      if (position > -1) {
        selectedProducts[groupName].splice(position, 1);
      } else {
        selectedProducts[groupName].push(index);
      }

      renderDashboard();
    }

    function switchCompetitorImage(index, imgIdx) {
      const options = Object.values(groupedProducts).flat();
      const product = options[index].product;
      const competitorImages = getFieldValue(product, 'Competitor Product Images');

      if (competitorImages && Array.isArray(competitorImages) && competitorImages[imgIdx]) {
        const mainImage = document.getElementById(`competitorImage-${index}`);
        if (mainImage) {
          mainImage.innerHTML = `<img src="${competitorImages[imgIdx].url}" alt="Inspiration">`;
        }

        const thumbnails = document.querySelectorAll(`#competitorThumbnails-${index} .product-thumbnail`);
        thumbnails.forEach((thumb, i) => {
          thumb.classList.toggle('active', i === imgIdx);
        });
      }
    }

    function switchMyImage(index, imgIdx) {
      const options = Object.values(groupedProducts).flat();
      const product = options[index].product;
      const myImages = getFieldValue(product, 'My Product Photos');

      if (myImages && Array.isArray(myImages) && myImages[imgIdx]) {
        const mainImage = document.getElementById(`myImg-${index}`);
        if (mainImage) {
          mainImage.innerHTML = `<img src="${myImages[imgIdx].url}" alt="My Product">`;
        }

        const thumbnails = document.querySelectorAll(`#myThumbnails-${index} .product-thumbnail`);
        thumbnails.forEach((thumb, i) => {
          thumb.classList.toggle('active', i === imgIdx);
        });
      }
    }

    async function downloadAndSubmit() {
      if (Object.keys(selectedProducts).length === 0 || Object.values(selectedProducts).every(arr => arr.length === 0)) {
        alert('Please select at least one product option.');
        return;
      }

      try {
        const selectedData = {};
        Object.entries(selectedProducts).forEach(([groupName, indices]) => {
          selectedData[groupName] = indices.map(idx => {
            const options = groupedProducts[groupName];
            const { product } = options[idx];
            return {
              name: getFieldValue(product, 'My Product Suggestion') || 'Unknown',
              myPrice: parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0,
              budgetPrice: parseFloat(getFieldValue(product, 'Competitor Quoted Price + GST')) || 0,
              quantity: parseFloat(getFieldValue(product, 'Competitor Product Quantity')) || 1
            };
          });
        });

        const response = await fetch(`${API_URL}/generate-summary`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: currentEmail,
            project: currentProject,
            selectedProducts: selectedData
          })
        });

        if (!response.ok) throw new Error('Failed to generate PDF');

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentProject}-sourcing.pdf`;
        a.click();

        alert('PDF generated and email sent successfully!');
      } catch (error) {
        console.error('Error:', error);
        alert('Error: ' + error.message);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
