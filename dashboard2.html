<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Sourcing Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f8f7f5;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      border-radius: 12px;
      padding: 40px;
      margin-bottom: 50px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 30px;
    }

    .header-logo {
      height: 70px;
      display: flex;
      align-items: center;
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .header-logo img {
      height: 100%;
      width: auto;
      object-fit: contain;
    }

    .header-title {
      flex: 1;
    }

    .company-name {
      color: #888;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    h1 {
      color: #ffffff;
      font-size: 36px;
      font-weight: 300;
      letter-spacing: -0.5px;
    }

    .project-selector {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .project-selector label {
      font-weight: 500;
      color: #e0e0e0;
      font-size: 15px;
    }

    .project-selector select {
      padding: 12px 16px;
      border: 1px solid #2d7a7a;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      background: white;
      color: #1a1a1a;
      transition: all 0.2s ease;
    }

    .project-selector select:hover,
    .project-selector select:focus {
      outline: none;
      border-color: #2d7a7a;
      box-shadow: 0 0 0 3px rgba(45, 122, 122, 0.1);
    }

    .dashboard {
      display: flex;
      flex-direction: column;
      gap: 50px;
      margin-bottom: 50px;
    }

    .product-card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
    }

    .product-card:hover {
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .card-header {
      font-size: 24px;
      font-weight: 400;
      color: #1a1a1a;
      margin-bottom: 35px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e0e0e0;
      letter-spacing: -0.3px;
    }

    .product-item {
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 25px;
      margin-bottom: 25px;
      transition: all 0.3s ease;
    }

    .product-item:last-child {
      margin-bottom: 0;
    }

    .product-item.sourced {
      border-color: #2d7a7a;
      background: #f0fafb;
    }

    .product-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .product-name {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }

    .status-badge {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.pending {
      background: #fff3cd;
      color: #856404;
    }

    .status-badge.sourced {
      background: #d4edda;
      color: #155724;
    }

    .product-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 25px;
    }

    .product-image-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .product-image-main {
      background: #fafaf9;
      border-radius: 10px;
      overflow: hidden;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: box-shadow 0.3s ease;
    }

    .product-image-main:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .product-image-main img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .product-thumbnails {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0;
    }

    .product-thumbnail {
      width: 60px;
      height: 60px;
      background: #fafaf9;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid #e0e0e0;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .product-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .product-thumbnail:hover {
      border-color: #2d7a7a;
      box-shadow: 0 2px 8px rgba(45, 122, 122, 0.2);
    }

    .product-thumbnail.active {
      border-color: #2d7a7a;
      box-shadow: 0 4px 12px rgba(45, 122, 122, 0.3);
    }

    .product-info {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .info-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .info-value {
      font-size: 15px;
      color: #333;
    }

    .pricing-section {
      background: #f9fafb;
      border-left: 3px solid #2d7a7a;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      font-size: 14px;
      color: #333;
    }

    .price-row strong {
      font-weight: 600;
    }

    .budget-tracker {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      margin-bottom: 50px;
    }

    .budget-header {
      font-size: 20px;
      font-weight: 400;
      color: #1a1a1a;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e0e0e0;
    }

    .budget-row {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
      font-size: 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .budget-row:last-child {
      border-bottom: none;
    }

    .budget-label {
      color: #666;
    }

    .budget-value {
      font-weight: 600;
      color: #1a1a1a;
    }

    .budget-total {
      display: flex;
      justify-content: space-between;
      padding: 20px 0;
      margin-top: 20px;
      border-top: 2px solid #2d7a7a;
      font-size: 18px;
      font-weight: 600;
    }

    .budget-status {
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-weight: 600;
      text-align: center;
    }

    .budget-status.on-track {
      background: #d4edda;
      color: #155724;
    }

    .budget-status.warning {
      background: #fff3cd;
      color: #856404;
    }

    .budget-status.over {
      background: #f8d7da;
      color: #721c24;
    }

    .summary {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .summary h2 {
      font-size: 28px;
      margin-bottom: 30px;
      color: #1a1a1a;
      font-weight: 400;
      letter-spacing: -0.3px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 15px;
    }

    .summary-row:last-child {
      border-bottom: none;
    }

    .summary-label {
      color: #666;
    }

    .summary-value {
      font-weight: 600;
      color: #1a1a1a;
    }

    .main-wrapper {
      display: flex;
      gap: 30px;
      margin-top: 30px;
    }

    .sidebar {
      position: sticky;
      top: 20px;
      width: 260px;
      height: fit-content;
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 15px;
      letter-spacing: 0.8px;
    }

    .sidebar-list {
      list-style: none;
      max-height: calc(100vh - 250px);
      overflow-y: auto;
    }

    .sidebar-list li {
      margin-bottom: 6px;
    }

    .sidebar-list button {
      width: 100%;
      padding: 11px 12px;
      background: #f5f5f5;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      font-size: 13px;
      color: #333;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .sidebar-list button:hover {
      background: #eef5f5;
      border-left-color: #2d7a7a;
    }

    .sidebar-list button.active {
      background: #eef5f5;
      border-left-color: #2d7a7a;
      font-weight: 600;
      color: #2d7a7a;
    }

    .content-wrapper {
      flex: 1;
    }

    .loading {
      text-align: center;
      color: #666;
      font-size: 16px;
    }

    .error {
      background: white;
      color: #d9534f;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 3px solid #d9534f;
    }

    .submit-button {
      background: #2d7a7a;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      margin-top: 30px;
    }

    .submit-button:hover {
      background: #246565;
    }

    @media (max-width: 768px) {
      .product-details {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 28px;
      }

      .header-content {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header" id="header" style="display: none;">
      <div class="header-content">
        <div class="header-logo">
          <img src="/cc-logo.png" alt="Construction Collection" onerror="this.style.display='none'">
        </div>
        <div class="header-title">
          <div class="company-name">Construction Collection</div>
          <h1 id="pageTitle">Product Sourcing Dashboard</h1>
        </div>
      </div>
      <div class="project-selector">
        <label for="projectSelect">Select Project:</label>
        <select id="projectSelect" onchange="changeProject()">
          <option value="">-- Choose a project --</option>
        </select>
      </div>
    </div>

    <div id="loading" class="loading">Loading projects...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div class="main-wrapper" id="mainWrapper" style="display: none;">
      <div class="sidebar">
        <div class="sidebar-title">Products</div>
        <ul class="sidebar-list" id="sidebarList"></ul>
      </div>
      <div class="content-wrapper">
        <div class="budget-tracker" id="budgetTracker" style="display: none;">
          <div class="budget-header">Budget Overview</div>
          <div id="budgetContent"></div>
        </div>
        <div class="dashboard" id="dashboard"></div>
        <div class="summary" id="summary" style="display: none;">
          <h2>Project Summary</h2>
          <div id="summaryContent"></div>
          <button class="submit-button" onclick="downloadAndSubmit()">📥 Download & Submit Sourcing Report</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin === 'http://localhost:3000'
      ? 'http://localhost:3000/api'
      : 'https://client-dashboard-ugki.onrender.com/api';
    let allProducts = [];
    let selectedProducts = {}; // Track multiple selections for samples
    let selectedForCost = {}; // Track which option is used for cost calculation (one per group)
    let currentProject = null;
    let projectBudget = 0;

    const urlParams = new URLSearchParams(window.location.search);
    const urlProject = urlParams.get('project');

    async function fetchProjects() {
      try {
        // Check if email is in URL - required for authentication
        const email = new URLSearchParams(window.location.search).get('email');

        if (!email) {
          // No email - cannot proceed without authentication
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').textContent = 'Please login with your email first.';
          return;
        }

        if (urlProject) {
          fetchProductsForProject(urlProject);
          return;
        }

        // Fetch ONLY this client's projects (filtered by email)
        const response = await fetch(`${API_URL}/client-projects?email=${encodeURIComponent(email)}`);
        if (!response.ok) throw new Error('Failed to fetch projects');

        const projects = await response.json();
        populateProjectDropdown(projects);

        document.getElementById('header').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading projects: ' + error.message;
      }
    }

    function populateProjectDropdown(projects) {
      const select = document.getElementById('projectSelect');
      projects.forEach(project => {
        const option = document.createElement('option');
        const projectName = typeof project === 'string' ? project : project.name;
        option.value = projectName;
        option.textContent = projectName;
        select.appendChild(option);
      });
    }

    function changeProject() {
      const projectSelect = document.getElementById('projectSelect');
      const selectedProject = projectSelect.value;
      if (selectedProject) {
        fetchProductsForProject(selectedProject);
        window.history.pushState({}, '', `?project=${encodeURIComponent(selectedProject)}`);
      }
    }

    async function fetchProductsForProject(projectName) {
      try {
        currentProject = projectName;
        selectedProducts = {}; // Reset selections
        selectedForCost = {}; // Reset cost selections

        const response = await fetch(`${API_URL}/products?project=${encodeURIComponent(projectName)}`);
        if (!response.ok) throw new Error('Failed to fetch products');

        allProducts = await response.json();

        if (urlProject) {
          const header = document.getElementById('header');
          document.getElementById('pageTitle').textContent = projectName;
          header.style.display = 'block';
        }

        renderDashboard();
        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error loading products: ' + error.message;
      }
    }

    function getFieldValue(record, fieldName) {
      if (!record.fields) return null;
      return record.fields[fieldName];
    }

    function getImageUrl(imageArray) {
      if (Array.isArray(imageArray) && imageArray.length > 0) {
        return imageArray[0].url;
      }
      return null;
    }

    function toggleProduct(index, groupName) {
      // Initialize as array if not exists
      if (!selectedProducts[groupName]) {
        selectedProducts[groupName] = [];
      }

      const selectedArray = selectedProducts[groupName];
      const indexPosition = selectedArray.indexOf(index);

      if (indexPosition > -1) {
        // Already selected - remove it
        selectedArray.splice(indexPosition, 1);
      } else {
        // Not selected - add it
        selectedArray.push(index);
      }

      // Clean up empty arrays
      if (selectedArray.length === 0) {
        delete selectedProducts[groupName];
      }

      renderDashboard();
      updateBudgetTracker();
      updateSummary();
    }

    function setOptionForCost(groupName, index) {
      selectedForCost[groupName] = index;
      updateBudgetTracker();
      updateSummary();
    }

    function switchImage(productIndex, imageIndex) {
      const mainImg = document.getElementById(`mainImg-${productIndex}`);
      const thumbnails = document.querySelectorAll(`#thumbnails-${productIndex} .product-thumbnail`);

      if (mainImg && allProducts[productIndex]) {
        const images = getFieldValue(allProducts[productIndex], 'My Product Photos');
        if (images && images[imageIndex]) {
          mainImg.src = images[imageIndex].url;

          // Update active thumbnail
          thumbnails.forEach((thumb, idx) => {
            thumb.classList.toggle('active', idx === imageIndex);
          });
        }
      }
    }

    function renderDashboard() {
      const dashboard = document.getElementById('dashboard');
      dashboard.innerHTML = '';

      if (allProducts.length === 0) {
        dashboard.innerHTML = '<div style="color: #666; text-align: center; padding: 40px;">No products found for this project.</div>';
        dashboard.style.display = 'flex';
        return;
      }

      const groupedProducts = {};
      allProducts.forEach((product, index) => {
        const groupName = product.fields['Competitor_Product_Name_Text'] || 'Unknown Group';
        if (!groupedProducts[groupName]) {
          groupedProducts[groupName] = [];
        }
        groupedProducts[groupName].push({ product, index });
      });

      const sortedGroupNames = Object.keys(groupedProducts).sort();

      sortedGroupNames.forEach(groupName => {
        const options = groupedProducts[groupName];
        const card = document.createElement('div');
        card.className = 'product-card';

        const optionCount = options.length;
        const selectedCount = selectedProducts[groupName] ? selectedProducts[groupName].length : 0;
        let optionsHtml = `
          <div class="card-header">
            <div class="card-header-title">${groupName}</div>
            <div class="option-count-badge">Select from ${optionCount} ${selectedCount > 0 ? `(${selectedCount} selected)` : ''}</div>
          </div>
          <div class="options-container">
        `;

        options.forEach(({ product, index }) => {
          const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown Product';
          const price = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
          const quantity = parseFloat(getFieldValue(product, 'Competitor Product Quantity')) || 1;
          const room = getFieldValue(product, 'Room (from Competitor\'s Products)') || '';
          const mySize = getFieldValue(product, 'Size') || '';
          const myImages = getFieldValue(product, 'My Product Photos');
          const myNotes = getFieldValue(product, 'My Notes') || '';

          const totalPrice = price * quantity;
          const isSelected = selectedProducts[groupName] && selectedProducts[groupName].includes(index);
          const optionClass = isSelected ? 'option-item selected' : 'option-item';

          optionsHtml += `
            <div class="${optionClass}" id="product-${index}">
              <div class="option-header">
                <button class="select-btn ${isSelected ? 'selected' : ''}" onclick="toggleProduct(${index}, '${groupName}')">
                  ${isSelected ? '✓ Selected' : 'Select'}
                </button>
              </div>
              <div class="product-header">
                <div class="product-name">${productName}</div>
              </div>

              <div class="product-details">
                <div class="product-image-container">
                  <div class="product-image-main" id="mainImage-${index}">
                    ${myImages ? `<img src="${getImageUrl(myImages)}" alt="Product" id="mainImg-${index}">` : '<div style="color: #ccc;">No Image</div>'}
                  </div>
                  ${myImages && myImages.length > 1 ? `
                    <div class="product-thumbnails" id="thumbnails-${index}">
                      ${myImages.map((img, imgIdx) => `
                        <div class="product-thumbnail ${imgIdx === 0 ? 'active' : ''}" onclick="switchImage(${index}, ${imgIdx})" title="Image ${imgIdx + 1}">
                          <img src="${img.url}" alt="Image ${imgIdx + 1}">
                        </div>
                      `).join('')}
                    </div>
                  ` : ''}
                </div>
                <div class="image-label">Inspiration Image</div>
                <div class="product-info">
                  ${room ? `<div class="info-row"><div class="info-label">Area/Room</div><div class="info-value">${room}</div></div>` : ''}
                  ${mySize ? `<div class="info-row"><div class="info-label">Specified Size</div><div class="info-value">${mySize}</div></div>` : ''}
                  <div class="info-row"><div class="info-label">Quantity</div><div class="info-value">${quantity}</div></div>
                  <div class="info-row"><div class="info-label">Budgeted Price</div><div class="info-value">$${price.toFixed(2)}</div></div>
                  ${myNotes ? `<div class="info-row"><div class="info-label">Notes</div><div class="info-value">${myNotes}</div></div>` : ''}
                </div>
              </div>

              <div class="pricing-section">
                <div class="price-row">
                  <span>Your Price per Unit:</span>
                  <span>$${price.toFixed(2)}</span>
                </div>
                <div class="price-row">
                  <span>Budgeted Price per Unit:</span>
                  <span>$${price.toFixed(2)}</span>
                </div>
                <div class="price-row" style="border-top: 1px solid #e0e0e0; padding-top: 8px; margin-top: 8px;">
                  <span><strong>Your Total Price:</strong></span>
                  <span><strong>$${totalPrice.toFixed(2)}</strong></span>
                </div>
                <div class="price-row">
                  <span><strong>Budgeted Total Price:</strong></span>
                  <span><strong>$${totalPrice.toFixed(2)}</strong></span>
                </div>
              </div>
            </div>
          `;
        });

        card.innerHTML = optionsHtml;
        dashboard.appendChild(card);
      });

      populateSidebar(sortedGroupNames);
      updateBudgetTracker();
      updateSummary();

      document.getElementById('mainWrapper').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'flex';
    }

    function populateSidebar(productNames) {
      const sidebarList = document.getElementById('sidebarList');
      sidebarList.innerHTML = '';

      productNames.forEach(name => {
        const li = document.createElement('li');
        const button = document.createElement('button');
        button.textContent = name || 'Unknown Product';
        button.onclick = () => scrollToProduct(name);
        button.className = 'sidebar-item active';
        button.setAttribute('data-product', name);
        li.appendChild(button);
        sidebarList.appendChild(li);
      });
    }

    function scrollToProduct(productName) {
      setTimeout(() => {
        const productCards = document.querySelectorAll('.product-card');
        for (let card of productCards) {
          const header = card.querySelector('.card-header');
          if (header && header.textContent.trim() === productName) {
            header.scrollIntoView({ behavior: 'smooth', block: 'start' });
            break;
          }
        }
      }, 100);
    }

    function updateBudgetTracker() {
      const budgetTracker = document.getElementById('budgetTracker');
      const budgetContent = document.getElementById('budgetContent');

      let totalBudget = 0;
      let totalCost = 0;
      let budgetItems = [];
      let costSelectionItems = {};

      // Collect all samples and cost selections
      Object.keys(selectedProducts).forEach(groupName => {
        const selectedIndices = selectedProducts[groupName];
        costSelectionItems[groupName] = selectedIndices;
      });

      // Calculate totals based on selectedForCost (one option per group)
      Object.keys(costSelectionItems).forEach(groupName => {
        const costIndex = selectedForCost[groupName];
        const indexToUse = costIndex !== undefined ? costIndex : costSelectionItems[groupName][0];

        const product = allProducts[indexToUse];
        const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown';
        const price = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
        const budgetPrice = parseFloat(getFieldValue(product, 'Competitor Quoted Price + GST')) || 0;
        const quantity = parseFloat(getFieldValue(product, 'Competitor Product Quantity')) || 1;

        const productCost = price * quantity;
        const productBudget = budgetPrice * quantity;
        const difference = productBudget - productCost;

        totalBudget += productBudget;
        totalCost += productCost;

        budgetItems.push({
          name: productName,
          budget: productBudget,
          cost: productCost,
          difference: difference,
          status: difference >= 0 ? 'under' : 'over'
        });
      });

      projectBudget = totalBudget;

      let html = '';

      // Per-product breakdown
      budgetItems.forEach(item => {
        const statusColor = item.status === 'under' ? '#2d7a7a' : '#d9534f';
        html += `
          <div style="margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #f0f0f0;">
            <div class="budget-row">
              <span class="budget-label">${item.name}</span>
            </div>
            <div class="budget-row" style="padding-left: 20px; font-size: 14px;">
              <span>Budget:</span>
              <span style="font-weight: 600;">$${item.budget.toFixed(2)}</span>
            </div>
            <div class="budget-row" style="padding-left: 20px; font-size: 14px;">
              <span>Sourced Cost:</span>
              <span style="font-weight: 600;">$${item.cost.toFixed(2)}</span>
            </div>
            <div class="budget-row" style="padding-left: 20px; font-size: 14px;">
              <span>Difference:</span>
              <span style="font-weight: 600; color: ${statusColor};">${item.status === 'under' ? '+' : ''}$${item.difference.toFixed(2)}</span>
            </div>
          </div>
        `;
      });

      // Totals
      const remaining = totalBudget - totalCost;
      const percentUsed = totalBudget > 0 ? (totalCost / totalBudget * 100).toFixed(0) : 0;

      let statusClass = 'on-track';
      let statusText = '✓ On Budget';
      if (remaining < 0) {
        statusClass = 'over';
        statusText = '✗ Over Budget';
      } else if (percentUsed > 85) {
        statusClass = 'warning';
        statusText = '⚠ Warning: Approaching Budget Limit';
      }

      html += `
        <div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #2d7a7a;">
          <div class="budget-row">
            <span class="budget-label"><strong>Total Budget:</strong></span>
            <span class="budget-value"><strong>$${totalBudget.toFixed(2)}</strong></span>
          </div>
          <div class="budget-row">
            <span class="budget-label"><strong>Total Sourced Cost:</strong></span>
            <span class="budget-value"><strong>$${totalCost.toFixed(2)}</strong></span>
          </div>
          <div class="budget-row">
            <span class="budget-label"><strong>Total Remaining:</strong></span>
            <span class="budget-value" style="color: ${remaining < 0 ? '#d9534f' : '#2d7a7a'};"><strong>$${remaining.toFixed(2)}</strong></span>
          </div>
          <div class="budget-row">
            <span class="budget-label"><strong>Budget Used:</strong></span>
            <span class="budget-value"><strong>${percentUsed}%</strong></span>
          </div>
        </div>
        <div class="budget-status ${statusClass}">${statusText}</div>
      `;

      budgetContent.innerHTML = html;
      budgetTracker.style.display = 'block';
    }

    function updateSummary() {
      const summary = document.getElementById('summary');
      const summaryContent = document.getElementById('summaryContent');

      let totalCost = 0;
      let selectedCount = 0;
      let selectedItems = [];
      let costSelectionItems = {};

      // Collect all samples
      Object.keys(selectedProducts).forEach(groupName => {
        const selectedIndices = selectedProducts[groupName];
        costSelectionItems[groupName] = selectedIndices;

        selectedIndices.forEach(index => {
          const product = allProducts[index];
          const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown';
          selectedCount++;
          selectedItems.push({
            groupName: groupName,
            name: productName,
            index: index
          });
        });
      });

      // Calculate totals based on selectedForCost (one option per group)
      Object.keys(costSelectionItems).forEach(groupName => {
        const costIndex = selectedForCost[groupName];
        const indexToUse = costIndex !== undefined ? costIndex : costSelectionItems[groupName][0];

        const product = allProducts[indexToUse];
        const price = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
        const quantity = parseFloat(getFieldValue(product, 'Competitor Product Quantity')) || 1;

        const itemTotal = price * quantity;
        totalCost += itemTotal;
      });

      let html = '<div class="summary-row"><span class="summary-label">Samples to Order:</span><span class="summary-value">' + selectedCount + '</span></div>';

      selectedItems.forEach(item => {
        html += `
          <div class="summary-row" style="padding-left: 20px; font-size: 13px;">
            <span class="summary-label">${item.groupName} - ${item.name}</span>
          </div>
        `;
      });

      html += '<div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #2d7a7a;"><div class="summary-label" style="margin-bottom: 15px; font-weight: 600; color: #1a1a1a;">Choose option for project total:</div>';

      // Show cost selection options
      Object.keys(costSelectionItems).forEach(groupName => {
        const selectedIndices = costSelectionItems[groupName];
        html += `<div style="margin-bottom: 18px;"><div style="font-weight: 500; margin-bottom: 10px; color: #2d7a7a;">${groupName}</div>`;

        selectedIndices.forEach(index => {
          const product = allProducts[index];
          const productName = getFieldValue(product, 'My Product Suggestion') || 'Unknown';
          const price = parseFloat(getFieldValue(product, 'My Retail Price + GST')) || 0;
          const isSelected = selectedForCost[groupName] === index;

          html += `
            <div style="margin-left: 10px; margin-bottom: 8px;">
              <input type="radio" id="cost-option-${index}" name="cost-${groupName}" value="${index}" ${isSelected ? 'checked' : ''} onchange="setOptionForCost('${groupName}', ${index})">
              <label for="cost-option-${index}" style="margin-left: 8px; cursor: pointer; color: #333;">${productName} - $${price.toFixed(2)}</label>
            </div>
          `;
        });
        html += '</div>';
      });

      html += '</div>';

      html += `
        <div style="margin-top: 30px; padding-top: 20px; border-top: 2px solid #2d7a7a;">
          <div class="budget-total">
            <span>Total Project Cost:</span>
            <span>$${totalCost.toFixed(2)}</span>
          </div>
        </div>
      `;

      summaryContent.innerHTML = html;
      summary.style.display = 'block';
    }
