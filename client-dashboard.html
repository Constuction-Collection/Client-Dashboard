<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      color: #333;
      font-size: 32px;
    }

    .header-subtitle {
      color: #666;
      font-size: 14px;
      margin-top: 5px;
    }

    .logout-btn {
      padding: 10px 20px;
      background: #d32f2f;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }

    .logout-btn:hover {
      background: #b71c1c;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .project-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      text-decoration: none;
      color: inherit;
    }

    .project-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    .project-name {
      font-size: 20px;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
    }

    .project-meta {
      font-size: 13px;
      color: #999;
      margin-bottom: 15px;
    }

    .project-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-current {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status-completed {
      background: #f3e5f5;
      color: #6a1b9a;
    }

    .empty-state {
      background: white;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .empty-state h2 {
      color: #333;
      margin-bottom: 10px;
    }

    .empty-state p {
      color: #666;
      margin-bottom: 20px;
    }

    .loading {
      background: white;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      color: #666;
    }

    .error {
      background: #ffebee;
      border-radius: 12px;
      padding: 20px;
      color: #d32f2f;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>My Projects</h1>
        <div class="header-subtitle" id="clientInfo"></div>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="error" class="error" style="display: none;"></div>
    <div id="loading" class="loading">Loading your projects...</div>
    <div id="projectsContainer"></div>
  </div>

  <script>
    const API_URL = window.location.origin === 'http://localhost:3000'
      ? 'http://localhost:3000/api'
      : 'https://client-dashboard-ugki.onrender.com/api';

    async function loadProjects() {
      const email = localStorage.getItem('clientEmail');
      const clientName = localStorage.getItem('clientName');
      const company = localStorage.getItem('company');

      if (!email) {
        window.location.href = 'login.html';
        return;
      }

      // Show client info
      document.getElementById('clientInfo').textContent = `${clientName} at ${company}`;

      try {
        const response = await fetch(`${API_URL}/client-projects?email=${encodeURIComponent(email)}`);

        if (!response.ok) {
          throw new Error('Failed to load projects');
        }

        const projects = await response.json();
        displayProjects(projects);

      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').textContent = error.message;
        document.getElementById('error').style.display = 'block';
      }
    }

    function displayProjects(projects) {
      const container = document.getElementById('projectsContainer');
      document.getElementById('loading').style.display = 'none';

      if (!projects || projects.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>No projects yet</h2>
            <p>You don't have any projects assigned yet. Contact us to get started.</p>
          </div>
        `;
        return;
      }

      let html = '<div class="projects-grid">';

      projects.forEach(project => {
        const statusClass = project.isCompleted ? 'status-completed' : 'status-current';
        const statusText = project.isCompleted ? 'Completed' : 'Current';

        html += `
          <a href="dashboard.html?project=${encodeURIComponent(project.name)}" class="project-card">
            <div class="project-name">${project.name}</div>
            <div class="project-meta">
              ${project.productCount} products
            </div>
            <span class="project-status ${statusClass}">${statusText}</span>
          </a>
        `;
      });

      html += '</div>';
      container.innerHTML = html;
    }

    function logout() {
      localStorage.removeItem('clientEmail');
      localStorage.removeItem('clientName');
      localStorage.removeItem('company');
      window.location.href = 'login.html';
    }

    // Load projects on page load
    loadProjects();
  </script>
</body>
</html>
